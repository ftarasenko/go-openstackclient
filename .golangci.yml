version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  exclusions:
    generated: lax
    rules:
      # gosec on test files is noise (fixture TLS, throwaway files, etc.).
      - path: _test\.go
        linters:
          - gosec
    paths:
      - vendor

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ftarasenko/go-openstackclient
  exclusions:
    paths:
      - vendor
