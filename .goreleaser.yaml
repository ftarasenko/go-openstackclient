# GoReleaser config — builds the 6-target matrix, cuts the GitHub Release, and
# publishes a Homebrew Cask to ftarasenko/homebrew-tap.
#
# Air-gap invariant: the Go build stays offline via -mod=vendor against the
# committed vendor/ (GoReleaser itself is fetched by CI, which is not air-gapped;
# only the compiled artifact must reproduce from vendor/).
#
# Release notes are NOT generated by GoReleaser: the changelog is disabled and
# the release body is set after publish via `gh release edit --notes-file`,
# produced by scripts/release-notes.sh (the single source of truth documented in
# AGENTS.md). Keep it that way so the Conventional-Commits → heading mapping does
# not fork.
version: 2

# Generate shell completions from the CLI itself (cobra ships the `completion`
# command) so they can be bundled into the release archives. Runs once, offline
# from vendor/. NOTE: these ride inside the tarballs for manual install; the
# Homebrew *cask* stages only the binary and cannot auto-wire completions into
# the shell's fpath (a formula could — casks have no completion stanza). Users
# installing via brew run `koc completion <shell>` themselves (see README).
before:
  hooks:
    - mkdir -p completions
    - sh -c 'go run -mod=vendor ./cmd/koc completion bash > completions/koc.bash'
    - sh -c 'go run -mod=vendor ./cmd/koc completion zsh  > completions/koc.zsh'
    - sh -c 'go run -mod=vendor ./cmd/koc completion fish > completions/koc.fish'

builds:
  - id: koc
    main: ./cmd/koc
    binary: koc
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -mod=vendor # vendor/ is committed; build reproduces offline
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64] # -> 6 combos, matches the previous hand-rolled matrix
    # Authenticode-sign each binary in place right after it is built, BEFORE it is
    # archived — so the .exe *inside* the Windows .zip carries a valid signature
    # (SmartScreen / "Unknown publisher" keys off the binary, not the container).
    # A post-build hook (not binary_signs) keeps signing in place without
    # registering a duplicate artifact. scripts/authenticode-sign.sh self-gates:
    # it signs only *.exe via osslsigncode and is a no-op for linux/darwin and
    # whenever WINDOWS_CERT_FILE is unset (a --snapshot build, or a release cut
    # before the cert is provisioned) — so a cert-less run ships unsigned binaries
    # instead of failing. CI populates WINDOWS_CERT_FILE / WINDOWS_CERT_PASSWORD
    # from repo secrets and installs osslsigncode (see release.yml).
    hooks:
      post:
        - cmd: ./scripts/authenticode-sign.sh "{{ .Path }}"
          output: true

archives:
  - id: koc
    ids: [koc]
    formats: [tar.gz]
    name_template: "koc_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - src: completions/*
        dst: completions
    # Windows ships as a .zip (not a bare .exe) so it can carry LICENSE + README
    # alongside the Authenticode-signed koc.exe; tar.gz is unfriendly on Windows.
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

# Release body comes from scripts/release-notes.sh via --release-notes; do not
# let GoReleaser also compute a changelog.
changelog:
  disable: true

homebrew_casks:
  - name: koc
    ids: [koc]
    repository:
      owner: ftarasenko
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/ftarasenko/go-openstackclient"
    description: "Single-binary OpenStack CLI for KeyStack (gophercloud v2)"
    license: "Apache-2.0"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@ftarasenko.dev
    # The binary is unsigned (Go only ad-hoc-signs darwin/arm64 so it *runs*);
    # casks are quarantined on download, so strip the quarantine flag on install
    # or launch dies with "koc cannot be verified".
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
              args: ["-dr", "com.apple.quarantine", "#{staged_path}/koc"]
          end
