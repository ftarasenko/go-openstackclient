# GoReleaser config — builds the 6-target matrix, cuts the GitHub Release, and
# publishes a Homebrew Cask to ftarasenko/homebrew-tap.
#
# Air-gap invariant: the Go build stays offline via -mod=vendor against the
# committed vendor/ (GoReleaser itself is fetched by CI, which is not air-gapped;
# only the compiled artifact must reproduce from vendor/).
#
# Release notes are NOT generated by GoReleaser: the changelog is disabled and
# the release body is supplied via `goreleaser release --release-notes=<file>`,
# produced by scripts/release-notes.sh (the single source of truth documented in
# AGENTS.md). Keep it that way so the Conventional-Commits → heading mapping does
# not fork.
version: 2

builds:
  - id: koc
    main: ./cmd/koc
    binary: koc
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -mod=vendor # vendor/ is committed; build reproduces offline
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64] # -> 6 combos, matches the previous hand-rolled matrix

archives:
  - id: koc
    ids: [koc]
    formats: [tar.gz]
    name_template: "koc_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

# Re-dispatching the same tag updates the existing release in place (see
# AGENTS.md "Cutting a release"); replace its artifacts rather than erroring.
release:
  mode: replace

# Release body comes from scripts/release-notes.sh via --release-notes; do not
# let GoReleaser also compute a changelog.
changelog:
  disable: true

homebrew_casks:
  - name: koc
    ids: [koc]
    repository:
      owner: ftarasenko
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/ftarasenko/go-openstackclient"
    description: "Single-binary OpenStack CLI for KeyStack (gophercloud v2)"
    license: "Apache-2.0"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@ftarasenko.dev
    # The binary is unsigned (Go only ad-hoc-signs darwin/arm64 so it *runs*);
    # casks are quarantined on download, so strip the quarantine flag on install
    # or launch dies with "koc cannot be verified".
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
              args: ["-dr", "com.apple.quarantine", "#{staged_path}/koc"]
          end
