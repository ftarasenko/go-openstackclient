name: ci

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    # Enforce the air-gap requirement: build and test offline from the committed
    # vendor/ tree with no module proxy.
    env:
      GOFLAGS: -mod=vendor
      GOPROXY: "off"
      CGO_ENABLED: "0"
    steps:
      # Third-party actions are pinned to full commit SHAs (supply-chain
      # hygiene for the air-gapped/FSTEC target); the trailing comment records
      # the human-readable version each SHA corresponds to.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      # A -mod=vendor build fails with "inconsistent vendoring" if vendor/ or
      # vendor/modules.txt drifts from go.mod, so this step doubles as the
      # air-gap vendor-consistency gate.
      - name: Build static binary (offline, from vendor/)
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=$(git describe --tags --always --dirty)" \
            -o koc ./cmd/koc
          file koc

      - name: Test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor
      GOPROXY: "off"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      # Pin the exact golangci-lint version used in development and verify the
      # download against the release's published SHA-256 checksums before
      # extracting, so a corrupted or swapped asset fails the build.
      - name: Install golangci-lint v2.5.0 (checksum-verified)
        env:
          GOPROXY: "" # allow the tool download (build/test stay offline)
        run: |
          VER=2.5.0
          TARBALL="golangci-lint-${VER}-linux-amd64.tar.gz"
          BASE="https://github.com/golangci/golangci-lint/releases/download/v${VER}"
          curl -sSfL "${BASE}/${TARBALL}" -o "${TARBALL}"
          curl -sSfL "${BASE}/golangci-lint-${VER}-checksums.txt" -o checksums.txt
          # sha256sum -c matches by the filename recorded in checksums.txt, so the
          # tarball must be on disk under its canonical name.
          grep " ${TARBALL}\$" checksums.txt | sha256sum -c -
          tar -xzf "${TARBALL}"
          sudo mv "golangci-lint-${VER}-linux-amd64/golangci-lint" /usr/local/bin/golangci-lint
          golangci-lint version

      - name: golangci-lint
        run: golangci-lint run ./...
