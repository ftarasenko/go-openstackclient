name: release

on:
  push:
    tags:
      - "v*"
  # Allow building artifacts on demand without cutting a release.
  workflow_dispatch:

permissions:
  contents: write

# Air-gap requirement: release binaries build offline from the committed vendor/.
env:
  GOFLAGS: -mod=vendor
  GOPROXY: "off"
  CGO_ENABLED: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for git describe

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build static binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="$(git describe --tags --always --dirty)"
          OUT="koc-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${OUT}" ./cmd/koc
          file "dist/${OUT}"
          ( cd dist && sha256sum "${OUT}" > "${OUT}.sha256" )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: koc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
