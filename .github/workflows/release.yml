name: release

on:
  push:
    tags:
      - "v*"
  # Publish on demand by supplying the tag to create. This environment blocks
  # pushing tag refs from a workstation (see AGENTS.md), so the workflow creates
  # the tag server-side with its own GITHUB_TOKEN, then hands it to GoReleaser.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create and publish (e.g. v0.3.1)"
        required: true
        type: string

permissions:
  contents: write # create the tag + GitHub Release in this repo

# Air-gap requirement: the compiled artifact builds offline from the committed
# vendor/. GoReleaser itself is fetched by the action (CI is not air-gapped).
env:
  GOFLAGS: -mod=vendor
  GOPROXY: "off"
  CGO_ENABLED: "0"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (supply-chain hygiene); comment = version.
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # full history + tags for git describe / release notes

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false

      # workflow_dispatch: create the tag at HEAD and push it (CI's GITHUB_TOKEN
      # can push tag refs; the local/agent env cannot), then check it out detached
      # so HEAD == the tag commit, which GoReleaser requires. On a tag-push
      # trigger the checkout is already at the tag, so this step is skipped.
      #
      # Versions are IMMUTABLE: a published tag is never moved or re-released. If
      # the tag already exists we stop — bump the version instead. To recover a
      # release that failed before it fully published, delete it first via the
      # delete-release workflow, which frees the version for a clean re-cut.
      - name: Create tag and check it out
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::tag $TAG already exists; releases are immutable. Bump the version, or delete it via the delete-release workflow before re-cutting."
            exit 1
          fi
          git tag -a "$TAG" -m "$TAG"
          git push origin "refs/tags/$TAG"
          git checkout --detach "$TAG"

      # Release body = Conventional-Commits notes from the committed script (the
      # single source of truth). Written OUTSIDE the work tree so GoReleaser does
      # not refuse on a dirty git state.
      - name: Build release notes from Conventional Commits
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: scripts/release-notes.sh "$TAG" | tee "$RUNNER_TEMP/RELEASE_NOTES.md"

      # Authenticode signing for the Windows binaries. Decodes the PKCS#12
      # code-signing cert from the WINDOWS_CERT_BASE64 secret to a temp file and
      # installs osslsigncode, then exports WINDOWS_CERT_FILE / WINDOWS_CERT_PASSWORD
      # for the GoReleaser build post-hook (scripts/authenticode-sign.sh). If the
      # secret is unset this is a no-op and the hook ships unsigned Windows
      # binaries (it self-gates on WINDOWS_CERT_FILE) — the release still succeeds.
      - name: Set up Windows code signing
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if [ -z "${WINDOWS_CERT_BASE64:-}" ]; then
            echo "::warning::WINDOWS_CERT_BASE64 secret not set — Windows binaries will be UNSIGNED."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y osslsigncode
          cert="$RUNNER_TEMP/koc-codesign.p12"
          printf '%s' "$WINDOWS_CERT_BASE64" | base64 -d > "$cert"
          echo "WINDOWS_CERT_FILE=$cert" >> "$GITHUB_ENV"
          echo "WINDOWS_CERT_PASSWORD=$WINDOWS_CERT_PASSWORD" >> "$GITHUB_ENV"

      # Builds the 6-target matrix, publishes the GitHub Release, and pushes
      # Casks/koc.rb to ftarasenko/homebrew-tap (needs the cross-repo PAT).
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # GoReleaser v2 accepts --release-notes but leaves the body empty, so set
      # it explicitly from the generated notes after publish (deterministic,
      # version-independent).
      - name: Set release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release edit "$TAG" --notes-file "$RUNNER_TEMP/RELEASE_NOTES.md"
