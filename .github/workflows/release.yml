name: release

on:
  push:
    tags:
      - "v*"
  # Publish on demand by supplying the tag to create (the workflow creates the
  # tag and GitHub Release server-side via GITHUB_TOKEN).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create and publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

# Air-gap requirement: release binaries build offline from the committed vendor/.
env:
  GOFLAGS: -mod=vendor
  GOPROXY: "off"
  CGO_ENABLED: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for git describe

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build static binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ inputs.tag }}"
          if [ -z "$VERSION" ]; then VERSION="$(git describe --tags --always --dirty)"; fi
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          OUT="koc-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${OUT}" ./cmd/koc
          file "dist/${OUT}"
          ( cd dist && sha256sum "${OUT}" > "${OUT}.sha256" )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: koc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
